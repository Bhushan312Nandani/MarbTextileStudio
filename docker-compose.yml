services:
  postgres_db:
    image: postgres:15-alpine
    container_name: apparel_ecommerce_db
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: apparel_db
    ports:
      - "5432:5432"
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data:
  